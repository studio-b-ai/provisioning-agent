name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: TypeScript Build
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install
      - run: npm run build

  smoke:
    name: Post-Deploy Smoke
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Health check with retry
        env:
          SERVICE_URL: ${{ secrets.SERVICE_URL }}
        run: |
          if [ -z "${SERVICE_URL}" ]; then
            echo "::warning::SERVICE_URL secret not set — skipping smoke test"
            exit 0
          fi
          echo "Waiting for Railway deploy (checking every 10s for up to 3 min)..."
          for i in $(seq 1 18); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${SERVICE_URL}/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed after $((i*10))s (HTTP ${STATUS})"
              exit 0
            fi
            echo "Attempt ${i}/18: HTTP ${STATUS} — retrying in 10s..."
            sleep 10
          done
          echo "::error::Health check failed after 180s"
          exit 1
