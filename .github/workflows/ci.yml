name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  smoke:
    name: Post-Deploy Smoke
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Health check with retry
        env:
          SERVICE_URL: ${{ secrets.SERVICE_URL }}
        run: |
          if [ -z "${SERVICE_URL}" ]; then
            echo "::warning::SERVICE_URL secret not set — skipping smoke test"
            exit 0
          fi
          echo "Waiting for Railway deploy (checking every 10s for up to 3 min)..."
          for i in $(seq 1 18); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${SERVICE_URL}/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed after $((i*10))s (HTTP ${STATUS})"
              exit 0
            fi
            echo "Attempt ${i}/18: HTTP ${STATUS} — retrying in 10s..."
            sleep 10
          done
          echo "::error::Health check failed after 180s"
          exit 1

  notify:
    name: Slack Alert on Failure
    needs: [build, smoke]
    if: failure() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Post to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL}" ]; then
            echo "::warning::SLACK_WEBHOOK_URL not set — skipping notification"
            exit 0
          fi
          curl -s -X POST "${SLACK_WEBHOOK_URL}" \
            -H 'Content-Type: application/json' \
            -d "{
              \"text\": \":red_circle: *CI Failed* — \`${{ github.repository }}\` on \`main\`\",
              \"blocks\": [
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \":red_circle: *CI Failed* — <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|${{ github.repository }}>\n>Commit: \`${{ github.sha }}\` by ${{ github.actor }}\n>Branch: \`main\`\"
                  }
                }
              ]
            }"
